<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keswick Discos Wedding Brochure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css">
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #3a3a3a, #050505 65%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 24px 10px 5px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #d6b56d;
      margin-bottom: 18px;
      font-size: 16px;
    }

    .book-area {
      width: 100%;
      overflow-x: auto;
      padding: 10px 0 5px;
    }

    #book {
      margin: 0 auto;
      box-shadow: 0 35px 90px rgba(0,0,0,0.85);
    }

    .page {
      background: white;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: white;
     }

    .controls {
      margin: 22px 0 10px;
    }

    button, .link-btn {
      background: linear-gradient(135deg, #d6b56d, #9c7835);
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    }

    button:hover, .link-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e3c57c, #a8833f);
    }

    #pageNumber {
      color: #ddd;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .thumbnails {
      max-width: 1100px;
      margin: 12px auto 25px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px;
    }

    .thumbnails img {
      width: 70px;
      height: 95px;
      object-fit: cover;
      cursor: pointer;
      border-radius: 5px;
      opacity: 0.75;
      border: 2px solid transparent;
    }

    .thumbnails img:hover {
      opacity: 1;
      border-color: #d6b56d;
    }

    .footer {
      color: #d6b56d;
      font-size: 14px;
      margin-bottom: 28px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 14px;
      }

      button, .link-btn {
        padding: 10px 15px;
        font-size: 13px;
      }

      .thumbnails img {
        width: 55px;
        height: 75px;
      }
    }
  </style>
</head>

<body>

  <h1>Keswick Discos Wedding Brochure</h1>
  <div class="subtitle">Wedding DJ Entertainment • Cumbria & The Lake District</div>

  <div class="book-area">
    <div id="book"></div>
  </div>

  <div class="controls">
    <button onclick="pageFlip.flipPrev()">Previous</button>
    <button onclick="pageFlip.flipNext()">Next</button>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="openFullscreen()">Full Screen</button>
    <a class="link-btn" href="https://www.keswickdiscos.co.uk/wedding-dj-entertainment" target="_blank">Enquire Now</a>
  </div>

  <div id="pageNumber">Page 1 of 18</div>

  <div class="thumbnails" id="thumbnails"></div>

  <div class="footer">www.keswickdiscos.co.uk</div>

  <script>
    const totalPages = 18;
    let zoomLevel = 1;

    const book = document.getElementById("book");
    const thumbnails = document.getElementById("thumbnails");

    for (let i = 1; i <= totalPages; i++) {
      const page = document.createElement("div");
      page.className = "page";
      page.innerHTML = `<img src="pages/page${i}.jpg" alt="Page ${i}">`;
      book.appendChild(page);

      const thumb = document.createElement("img");
      thumb.src = `pages/page${i}.jpg`;
      thumb.alt = `Page ${i}`;
      thumb.onclick = () => pageFlip.flip(i - 1);
      thumbnails.appendChild(thumb);
    }

    const pageFlip = new St.PageFlip(book, {
      width: 550,
      height: 720,
      size: "stretch",
      minWidth: 315,
      maxWidth: 1100,
      minHeight: 420,
      maxHeight: 720,
      showCover: true,
      usePortrait: true,
      mobileScrollSupport: false,
      flippingTime: 900,
      drawShadow: true,
      maxShadowOpacity: 0.55
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    pageFlip.on("flip", (e) => {
      document.getElementById("pageNumber").innerText =
        "Page " + (e.data + 1) + " of " + totalPages;
    });

    function zoomIn() {
      zoomLevel += 0.1;
      book.style.transform = "scale(" + zoomLevel + ")";
      book.style.transformOrigin = "top center";
    }

    function zoomOut() {
      zoomLevel = Math.max(0.7, zoomLevel - 0.1);
      book.style.transform = "scale(" + zoomLevel + ")";
      book.style.transformOrigin = "top center";
    }

    function openFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) elem.requestFullscreen();
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") pageFlip.flipPrev();
      if (event.key === "ArrowRight") pageFlip.flipNext();
    });
  </script>

</body>
</html>
