<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keswick Discos Wedding Brochure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 20px 10px 5px;
    }

    .subtitle {
      color: #d6b56d;
      margin-bottom: 15px;
    }

    #book {
      margin: 0 auto;
    }

    .page {
      background: white;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
    }

    button {
      margin: 10px 5px;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: #c9a45c;
      color: white;
      cursor: pointer;
    }

    #pageNumber {
      margin: 10px;
      color: #ddd;
    }
  </style>
</head>

<body>

  <h1>Keswick Discos Wedding Brochure</h1>
  <div class="subtitle">Wedding DJ Entertainment • Cumbria & The Lake District</div>

  <div id="book"></div>

  <button onclick="pageFlip.flipPrev()">Previous</button>
  <button onclick="pageFlip.flipNext()">Next</button>

  <div id="pageNumber">Page 1 of 18</div>

  <script>
    const totalPages = 18;
    const book = document.getElementById("book");

    for (let i = 1; i <= totalPages; i++) {
      const page = document.createElement("div");
      page.className = "page";
      page.innerHTML = `<img src="pages/page${i}.jpg" alt="Page ${i}">`;
      book.appendChild(page);
    }

    const pageFlip = new St.PageFlip(book, {
      width: 550,
      height: 720,
      size: "stretch",
      minWidth: 315,
      maxWidth: 1100,
      minHeight: 420,
      maxHeight: 720,
      showCover: true,
      usePortrait: true,
      drawShadow: true,
      maxShadowOpacity: 0.5
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    pageFlip.on("flip", (e) => {
      document.getElementById("pageNumber").innerText =
        "Page " + (e.data + 1) + " of " + totalPages;
    });
  </script>
