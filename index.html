<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keswick Discos Wedding Brochure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(80,80,80,0.35), transparent 40%),
        linear-gradient(135deg, #070707, #1c1c1c);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 28px 10px 6px;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #d6b56d;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .book-wrap {
      width: 100%;
      overflow: hidden;
    }

    #flipbook {
      width: 1100px;
      height: 720px;
      margin: 0 auto;
      box-shadow: 0 35px 90px rgba(0,0,0,0.85);
      transition: transform 0.3s ease;
    }

    #flipbook .page {
      background: white;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.18);
    }

    #flipbook img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      margin: 28px 0 15px;
    }

    button {
      background: linear-gradient(135deg, #d6b56d, #9c7835);
      color: white;
      padding: 13px 24px;
      margin: 6px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }

    button:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e2c27a, #a8833f);
    }

    #pageNumber {
      color: #ddd;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .footer {
      color: #d6b56d;
      font-size: 14px;
      margin-bottom: 30px;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 14px;
      }

      #flipbook {
        width: 94vw;
        height: 62vw;
      }

      button {
        padding: 11px 17px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <h1>Keswick Discos Wedding Brochure</h1>
  <div class="subtitle">Wedding DJ Entertainment • Cumbria & The Lake District</div>

  <div class="book-wrap">
    <div id="flipbook">
      <div class="page"><img src="pages/page1.jpg"></div>
      <div class="page"><img src="pages/page2.jpg"></div>
      <div class="page"><img src="pages/page3.jpg"></div>
      <div class="page"><img src="pages/page4.jpg"></div>
      <div class="page"><img src="pages/page5.jpg"></div>
      <div class="page"><img src="pages/page6.jpg"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="$('#flipbook').turn('previous')">Previous</button>
    <button onclick="$('#flipbook').turn('next')">Next</button>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="openFullscreen()">Full Screen</button>
  </div>

  <div id="pageNumber">Page 1 of 6</div>
  <div class="footer">www.keswickdiscos.co.uk</div>

  <script>
    let zoomLevel = 1;

    $("#flipbook").turn({
      width: 1100,
      height: 720,
      autoCenter: true,
      gradients: true,
      elevation: 80,
      duration: 900,
      when: {
        turned: function(event, page) {
          $("#pageNumber").text("Page " + page + " of 6");
        }
      }
    });

    function zoomIn() {
      zoomLevel += 0.1;
      document.getElementById("flipbook").style.transform = "scale(" + zoomLevel + ")";
    }

    function zoomOut() {
      zoomLevel = Math.max(0.7, zoomLevel - 0.1);
      document.getElementById("flipbook").style.transform = "scale(" + zoomLevel + ")";
    }

    function openFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") {
        $("#flipbook").turn("previous");
      }
      if (event.key === "ArrowRight") {
        $("#flipbook").turn("next");
      }
    });
  </script>

</body>
</html>
