<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keswick Discos Wedding Brochure</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 20px 0;
    }

    #flipbook {
      width: 900px;
      height: 600px;
      margin: 20px auto;
    }

    #flipbook .page {
      background: white;
    }

    #flipbook img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #flipbook {
        width: 95vw;
        height: 65vw;
      }
    }
  </style>
</head>

<body>

  <h1>Keswick Discos Wedding Brochure</h1>

  <div id="flipbook">
    <div class="page"><img src="pages/page1.jpg"></div>
    <div class="page"><img src="pages/page2.jpg"></div>
    <div class="page"><img src="pages/page3.jpg"></div>
    <div class="page"><img src="pages/page4.jpg"></div>
  </div>

  <button onclick="$('#flipbook').turn('previous')">Previous</button>
  <button onclick="$('#flipbook').turn('next')">Next</button>

  <script>
    $("#flipbook").turn({
      width: 900,
      height: 600,
      autoCenter: true
    });
  </script>

</body>
</html>
