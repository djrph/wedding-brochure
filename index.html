<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keswick Discos Wedding Brochure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css">
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #333, #050505);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 25px 10px 5px;
      font-size: 30px;
    }

    .subtitle {
      color: #d6b56d;
      margin-bottom: 20px;
    }

    #book {
      margin: 0 auto;
    }

    .page {
      background: white;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      margin: 20px 0;
    }

    button {
      background: linear-gradient(135deg, #d6b56d, #9c7835);
      color: white;
      border: none;
      padding: 12px 22px;
      margin: 5px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
    }

    #pageNumber {
      margin-bottom: 25px;
      color: #ddd;
    }
  </style>
</head>

<body>

  <h1>Keswick Discos Wedding Brochure</h1>
  <div class="subtitle">Wedding DJ Entertainment • Cumbria & The Lake District</div>

  <div id="book">
    <div class="page"><img src="pages/page1.jpg"></div>
    <div class="page"><img src="pages/page2.jpg"></div>
    <div class="page"><img src="pages/page3.jpg"></div>
    <div class="page"><img src="pages/page4.jpg"></div>
    <div class="page"><img src="pages/page5.jpg"></div>
    <div class="page"><img src="pages/page6.jpg"></div>
  </div>

  <div class="controls">
    <button onclick="pageFlip.flipPrev()">Previous</button>
    <button onclick="pageFlip.flipNext()">Next</button>
    <button onclick="openFullscreen()">Full Screen</button>
  </div>

  <div id="pageNumber">Page 1 of 6</div>

  <script>
    const pageFlip = new St.PageFlip(
      document.getElementById("book"),
      {
        width: 550,
        height: 720,
        size: "stretch",
        minWidth: 315,
        maxWidth: 1100,
        minHeight: 420,
        maxHeight: 720,
        showCover: true,
        mobileScrollSupport: false,
        usePortrait: true,
        flippingTime: 900,
        drawShadow: true,
        maxShadowOpacity: 0.5
      }
    );

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

    pageFlip.on("flip", (e) => {
      document.getElementById("pageNumber").innerText =
        "Page " + (e.data + 1) + " of 6";
    });

    function openFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowLeft") pageFlip.flipPrev();
      if (event.key === "ArrowRight") pageFlip.flipNext();
    });
  </script>

</body>
</html>
